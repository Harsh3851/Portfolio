<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harsh's Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">
        <div class="container">
            <div class="navbar">
                <div class="logo-container">
                    <img src="images/letter H.jfif" alt="Logo" class="logo">
                    <div class="logo-text">arsh Shukla</div>
                </div>
                <div class="nav-items">
                   <div><a href = "#projects">Projects</a></div>
                    <div><a href = "#skills">Skills</a></div>
                    <div><a href = "#contact">Contact</a></div>
                </div>
            </div>
        </div>
        <div class="hero-section">
            <div class="faded-text">Harsh Shukla</div>
            <div class="hero-section-left">
                <div class="hero-heading">Welcome to My Portfolio</div>
                <div class="hero-heading hero-section-subheading">
                    I am an <span class = "role"></span>
                </div>
                <div class="hero-section-description">
                    I am a passionate software developer with experience in building web applications.
                    I enjoy learning new technologies and solving complex problems. Below are some of my projects and skills.
                </div>
                <div class="btn-pink" id = "btn">Get in Touch</div>
            </div>
            <div class="hero-section-right">
                <div class="absolute icons icon-dev">
                    <img src="images/dev.png" alt="dev icon">
                </div>
                <div class="absolute icons icon-idea">
                    <img src="images/Idea.png" alt="code icon">
                </div>
                <div class="absolute icons icon-execution">
                    <img src="images/execution.png" alt="idea icon">
                </div>
                <div class="absolute icons icon-dots">
                    <img src="images/dots.png" alt="presentation icon"> 
                </div>
                <div class="absolute icons user-image">
                    <img src="images/Harsh_img.jpeg" alt="code icon">
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script src="https://kit.fontawesome.com/58a810656e.js" crossorigin="anonymous"></script>
    <script>
        var typeData = new Typed(".role", {
            strings: [
                "Full Stack Developer",
                "Web Developer",
                "UI-UX Designer",
                "Backend Developer",
                "Coder",
            ],
            loop: true,
            typeSpeed: 100,
            backSpeed: 80,
            backDelay: 1000,
        });
    </script>
</body>
</html>
